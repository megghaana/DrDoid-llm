name: CI — Oracle LLM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  validate-manifests:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Dry-run ollama deployment
        run: kubectl apply --dry-run=client -f k8s/ollama-deployment.yaml

      - name: Dry-run monitoring stack
        run: kubectl apply --dry-run=client -f k8s/monitoring-fixed.yaml

  lint-python:
    name: Lint compare script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flake8 openai requests tabulate

      - name: Lint
        run: flake8 compare/compare_models.py --max-line-length=120

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (without pushing)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: oracle-llm:${{ github.sha }}

  push-image:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [validate-manifests, build-image]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/oracle-llm:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/oracle-llm:${{ github.sha }}
